<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Result Assistant</title>
<style>
  * { box-sizing: border-box; font-family: system-ui, sans-serif; }
  body { background: #0f172a; margin: 0; display: flex; justify-content: center; padding: 30px; }
  .chat-container {
    width: 100%; max-width: 480px; background: #1e293b; border-radius: 16px;
    display: flex; flex-direction: column; height: 90vh; overflow: hidden;
    box-shadow: 0 10px 40px rgba(0,0,0,0.4);
  }
  .chat-header {
    background: #1E2761; color: white; padding: 16px 20px; font-weight: 700; font-size: 1.1rem;
    display: flex; justify-content: space-between; align-items: center;
  }
  #stopBtn {
    background: #dc2626; border: none; color: white; border-radius: 8px;
    padding: 6px 12px; font-size: 0.8rem; cursor: pointer; font-weight: 600;
  }
  .chat-messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 10px; }
  .msg { padding: 10px 14px; border-radius: 12px; max-width: 85%; line-height: 1.5; font-size: 0.92rem; }
  .msg.user { align-self: flex-end; background: #b8205b; color: white; white-space: pre-wrap; }
  .msg.bot { align-self: flex-start; background: #334155; color: #e2e8f0; }
  .msg.bot p { margin: 0 0 8px 0; }
  .msg.bot p:last-child { margin-bottom: 0; }
  .msg.bot ul { margin: 4px 0 8px 0; padding-left: 20px; }
  .msg.bot li { margin-bottom: 4px; }
  .msg.bot strong { color: #93c5fd; }
  .msg.bot h1, .msg.bot h2, .msg.bot h3 { margin: 8px 0 6px 0; font-size: 1rem; color: #93c5fd; }
  .chat-input-row { display: flex; gap: 8px; padding: 12px; border-top: 1px solid #334155; }
  .chat-input-row input {
    flex: 1; padding: 12px; border-radius: 10px; border: none; background: #0f172a; color: white; font-size: 0.95rem;
  }
  .chat-input-row button {
    border: none; border-radius: 10px; padding: 0 16px; font-weight: 700; cursor: pointer; color: white;
  }
  #sendBtn { background: #1E2761; }
  #micBtn { background: #059669; font-size: 1.1rem; }
  #micBtn.listening { background: #dc2626; animation: pulse 1s infinite; }
  @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }
</style>
</head>
<body>

<div class="chat-container">
  <div class="chat-header">
    <span>🎓 Result Assistant</span>
    <button id="stopBtn">🔇 Stop</button>
  </div>
  <div class="chat-messages" id="messages"></div>
  <div class="chat-input-row">
    <input id="textInput" type="text" placeholder="Type or speak your question..." />
    <button id="micBtn">🎤</button>
    <button id="sendBtn">Send</button>
  </div>
</div>

<script>
const API_URL = "http://localhost:5000/api/chat";

let sessionId = localStorage.getItem("sessionId");
if (!sessionId) {
  sessionId = crypto.randomUUID();
  localStorage.setItem("sessionId", sessionId);
}

const messagesEl = document.getElementById("messages");
const textInput = document.getElementById("textInput");
const sendBtn = document.getElementById("sendBtn");
const micBtn = document.getElementById("micBtn");
const stopBtn = document.getElementById("stopBtn");

// ---- Tiny markdown -> HTML converter (bold, bullets, headers, line breaks) ----
function renderMarkdown(text) {
  let html = text
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;");

  html = html.replace(/^### (.*$)/gim, "<h3>$1</h3>");
  html = html.replace(/^## (.*$)/gim, "<h2>$1</h2>");
  html = html.replace(/^# (.*$)/gim, "<h1>$1</h1>");
  html = html.replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>");

  // Convert consecutive "* item" or "- item" lines into a <ul>
  html = html.replace(/(?:^|\n)((?:[*-] .*(?:\n|$))+)/g, (block) => {
    const items = block
      .trim()
      .split("\n")
      .map((line) => "<li>" + line.replace(/^[*-]\s+/, "") + "</li>")
      .join("");
    return "<ul>" + items + "</ul>";
  });

  // Remaining newlines become paragraph breaks
  html = html
    .split(/\n{2,}/)
    .map((para) => (para.startsWith("<ul>") || para.startsWith("<h") ? para : "<p>" + para.replace(/\n/g, "<br>") + "</p>"))
    .join("");

  return html;
}

function addMessage(text, sender) {
  const div = document.createElement("div");
  div.className = "msg " + sender;
  if (sender === "bot") {
    div.innerHTML = renderMarkdown(text);
  } else {
    div.textContent = text;
  }
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

async function sendMessage(message) {
  if (!message.trim()) return;
  addMessage(message, "user");
  textInput.value = "";

  try {
    const res = await fetch(API_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ sessionId, message }),
    });
    const data = await res.json();
    const reply = data.reply || data.error || "Something went wrong.";
    addMessage(reply, "bot");
    speak(reply);
  } catch (err) {
    addMessage("Error reaching server: " + err.message, "bot");
  }
}

// ---- Text-to-speech: cancel any ongoing speech before starting new ----
function speak(text) {
  speechSynthesis.cancel(); // stop whatever is currently being read
  const plainText = text.replace(/[*#_`]/g, ""); // strip markdown symbols before reading aloud
  const utterance = new SpeechSynthesisUtterance(plainText);
  utterance.rate = 1;
  speechSynthesis.speak(utterance);
}

stopBtn.addEventListener("click", () => speechSynthesis.cancel());

// ---- Speech-to-text ----
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
let recognition;
let listening = false;

if (SpeechRecognition) {
  recognition = new SpeechRecognition();
  recognition.lang = "en-IN";
  recognition.interimResults = false;

  recognition.onresult = (event) => {
    const transcript = event.results[0][0].transcript;
    sendMessage(transcript);
  };

  recognition.onend = () => {
    listening = false;
    micBtn.classList.remove("listening");
  };
} else {
  micBtn.disabled = true;
  micBtn.title = "Speech recognition not supported in this browser (use Chrome)";
}

micBtn.addEventListener("click", () => {
  if (!recognition) return;
  if (listening) {
    recognition.stop();
  } else {
    recognition.start();
    listening = true;
    micBtn.classList.add("listening");
  }
});

sendBtn.addEventListener("click", () => sendMessage(textInput.value));
textInput.addEventListener("keydown", (e) => {
  if (e.key === "Enter") sendMessage(textInput.value);
});

addMessage("Hi! Tell me your hall ticket number to get started, e.g. \"My hall ticket is 23XU1A0578\".", "bot");
</script>

</body>
</html>
