<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport"
    content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <title>Result Assistant · WITS</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Inter:wght@400;500;600;700&display=swap');

    :root {
      --navy: #101c38;
      --navy-2: #1c2f56;
      --navy-deep: #0a1326;
      --crimson: #a3222a;
      --crimson-dark: #7c191f;
      --gold: #c9a24b;
      --gold-light: #e7d6a3;
      --parchment: #f6f1e4;
      --ivory: #fbf8f0;
      --ink: #1e2233;
      --ink-soft: #4a4f63;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: var(--navy-deep);
      overscroll-behavior: none;
      font-family: 'Inter', system-ui, sans-serif;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100dvh;
      width: 100vw;
      overflow: hidden;
      background:
        radial-gradient(ellipse at 20% -10%, rgba(201, 162, 75, 0.12), transparent 55%),
        radial-gradient(ellipse at 100% 110%, rgba(163, 34, 42, 0.18), transparent 55%),
        var(--navy-deep);
    }

    .chat-container {
      width: 100%;
      max-width: 480px;
      height: 100dvh;
      max-height: 860px;
      background: var(--parchment);
      border-radius: 18px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.45), 0 0 0 1px rgba(201, 162, 75, 0.25);
      position: relative;
    }

    /* ---------- Header ---------- */
    .chat-header {
      background: linear-gradient(155deg, var(--navy) 0%, var(--navy-2) 55%, var(--navy) 100%);
      color: var(--gold-light);
      padding: 14px 18px;
      padding-top: calc(14px + env(safe-area-inset-top));
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
      position: relative;
      z-index: 2;
      border-bottom: 1px solid rgba(201, 162, 75, 0.35);
    }

    .crest {
      width: 40px;
      height: 40px;
      flex-shrink: 0;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 30%, #fff, var(--gold-light) 55%, var(--gold) 100%);
      padding: 3px;
      box-shadow: 0 0 0 1px rgba(201, 162, 75, 0.6), 0 2px 8px rgba(0, 0, 0, 0.4);
    }

    .crest img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      border-radius: 50%;
    }

    .header-text {
      display: flex;
      flex-direction: column;
      line-height: 1.15;
      flex: 1;
      min-width: 0;
    }

    .header-title {
      font-family: 'Cinzel', serif;
      font-weight: 600;
      font-size: 1.02rem;
      letter-spacing: 0.06em;
      color: #f5ecd2;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .header-sub {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 0.78rem;
      color: var(--gold);
      letter-spacing: 0.03em;
      margin-top: 2px;
    }

    .header-rule {
      position: absolute;
      left: 0;
      right: 0;
      bottom: -1px;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--gold) 20%, var(--gold-light) 50%, var(--gold) 80%, transparent);
      background-size: 200% 100%;
      animation: shimmer 5s linear infinite;
    }

    @keyframes shimmer {
      0% {
        background-position: 200% 0;
      }

      100% {
        background-position: -200% 0;
      }
    }

    #stopBtn {
      background: transparent;
      border: 1px solid rgba(201, 162, 75, 0.55);
      color: var(--gold-light);
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 0.72rem;
      letter-spacing: 0.05em;
      cursor: pointer;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      text-transform: uppercase;
      flex-shrink: 0;
      transition: background 0.2s, transform 0.15s;
    }

    #stopBtn:hover {
      background: rgba(201, 162, 75, 0.15);
    }

    #stopBtn:active {
      transform: scale(0.95);
    }

    /* ---------- Messages ---------- */
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 18px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      background:
        radial-gradient(circle at 50% 38%, rgba(16, 28, 56, 0.05) 0%, transparent 45%),
        var(--parchment);
      position: relative;
    }

    .chat-messages::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image: var(--watermark);
      background-repeat: no-repeat;
      background-position: center 46%;
      background-size: 480px;
      opacity: 0.2;
      pointer-events: none;
    }

    .chat-messages::-webkit-scrollbar {
      width: 6px;
    }

    .chat-messages::-webkit-scrollbar-thumb {
      background: rgba(16, 28, 56, 0.18);
      border-radius: 4px;
    }

    .msg {
      padding: 11px 15px;
      border-radius: 14px;
      max-width: 85%;
      line-height: 1.5;
      font-size: 0.92rem;
      word-wrap: break-word;
      position: relative;
      z-index: 1;
      animation: rise 0.32s cubic-bezier(.2, .7, .3, 1) both;
    }

    @keyframes rise {
      from {
        opacity: 0;
        transform: translateY(10px) scale(0.98);
      }

      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .msg.user {
      align-self: flex-end;
      background: linear-gradient(155deg, var(--crimson) 0%, var(--crimson-dark) 100%);
      color: var(--ivory);
      white-space: pre-wrap;
      border-bottom-right-radius: 4px;
      box-shadow: 0 3px 10px rgba(124, 25, 31, 0.35);
    }

    .msg.bot {
      align-self: flex-start;
      background: var(--ivory);
      color: var(--ink);
      border: 1px solid rgba(16, 28, 56, 0.1);
      border-left: 3px solid var(--gold);
      border-bottom-left-radius: 4px;
      box-shadow: 0 2px 8px rgba(16, 28, 56, 0.06);
    }

    .msg.bot p {
      margin: 0 0 8px 0;
    }

    .msg.bot p:last-child {
      margin-bottom: 0;
    }

    .msg.bot ul {
      margin: 4px 0 8px;
      padding-left: 20px;
    }

    .msg.bot li {
      margin-bottom: 4px;
    }

    .msg.bot strong {
      color: var(--navy-2);
      font-weight: 700;
    }

    .msg.bot h1,
    .msg.bot h2,
    .msg.bot h3 {
      margin: 8px 0 6px;
      font-size: 0.98rem;
      font-family: 'Cinzel', serif;
      font-weight: 600;
      color: var(--crimson);
      letter-spacing: 0.02em;
    }

    /* Typing indicator */
    .msg.bot.typing {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 13px 16px;
    }

    .typing-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--navy-2);
      animation: bounce 1.2s infinite ease-in-out;
    }

    .typing-dot:nth-child(2) {
      animation-delay: 0.15s;
      background: var(--gold);
    }

    .typing-dot:nth-child(3) {
      animation-delay: 0.3s;
      background: var(--crimson);
    }

    @keyframes bounce {

      0%,
      60%,
      100% {
        transform: translateY(0);
        opacity: 0.6;
      }

      30% {
        transform: translateY(-5px);
        opacity: 1;
      }
    }

    /* ---------- Input row ---------- */
    .chat-input-row {
      display: flex;
      gap: 8px;
      padding: 12px;
      padding-bottom: calc(12px + env(safe-area-inset-bottom));
      background: linear-gradient(0deg, var(--navy) 0%, var(--navy-2) 100%);
      flex-shrink: 0;
      border-top: 1px solid rgba(201, 162, 75, 0.35);
    }

    .chat-input-row input {
      flex: 1;
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid rgba(201, 162, 75, 0.35);
      background: rgba(255, 255, 255, 0.06);
      color: var(--gold-light);
      font-size: 0.95rem;
      min-width: 0;
      font-family: 'Inter', sans-serif;
      transition: border-color 0.2s, background 0.2s;
    }

    .chat-input-row input::placeholder {
      color: rgba(231, 214, 163, 0.45);
    }

    .chat-input-row input:focus {
      outline: none;
      border-color: var(--gold);
      background: rgba(255, 255, 255, 0.1);
    }

    .chat-input-row button {
      border: none;
      border-radius: 12px;
      padding: 0 16px;
      font-weight: 700;
      cursor: pointer;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.15s, filter 0.2s;
    }

    .chat-input-row button:active {
      transform: scale(0.92);
    }

    #sendBtn {
      background: linear-gradient(155deg, var(--gold-light), var(--gold));
      color: var(--navy-deep);
      min-width: 48px;
    }

    #sendBtn:hover {
      filter: brightness(1.08);
    }

    #sendBtn svg {
      width: 18px;
      height: 18px;
    }

    #micBtn {
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(201, 162, 75, 0.35);
      color: var(--gold-light);
      font-size: 1.05rem;
      min-width: 48px;
    }

    #micBtn.listening {
      background: rgba(163, 34, 42, 0.25);
      border: 1px solid var(--crimson);
      color: #ffb4b8;
      animation: pulse 1s infinite;
    }

    @keyframes pulse {
      0% {
        box-shadow: 0 0 0 0 rgba(163, 34, 42, 0.5);
      }

      70% {
        box-shadow: 0 0 0 8px rgba(163, 34, 42, 0);
      }

      100% {
        box-shadow: 0 0 0 0 rgba(163, 34, 42, 0);
      }
    }

    @media (max-width: 768px) {
      .chat-container {
        width: 100vw;
        max-width: 100vw;
        height: 100dvh;
        max-height: 100dvh;
        border-radius: 0;
        box-shadow: none;
      }

      .chat-header {
        padding: 12px 14px;
        padding-top: calc(12px + env(safe-area-inset-top));
      }

      .header-title {
        font-size: 0.95rem;
      }

      .chat-messages {
        padding: 14px 12px;
      }

      .msg {
        max-width: 92%;
        font-size: 0.9rem;
      }

      .chat-input-row {
        padding: 10px;
        gap: 6px;
      }

      .chat-input-row input {
        font-size: 16px;
        padding: 12px;
      }

      #sendBtn,
      #micBtn {
        min-width: 50px;
        height: 46px;
      }

      #stopBtn {
        padding: 6px 10px;
        font-size: 0.68rem;
      }
    }

    @media (prefers-reduced-motion: reduce) {

      .msg,
      .header-rule,
      .typing-dot,
      #micBtn.listening {
        animation: none !important;
      }
    }
  </style>
</head>

<body>

  <div class="chat-container">
    <div class="chat-header">
      <div class="crest">
        <img
          src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQD9uICRcz-G4isMW8_kd9JLE93qugYOmE1ZhjSEAVsQt0f2Nvo20xPu70&s=10"
          alt="WITS crest" />
      </div>
      <div class="header-text">
        <span class="header-title">RESULT ASSISTANT</span>
        <span class="header-sub">College · Academic Records</span>
      </div>
      <button id="stopBtn">Stop</button>
      <div class="header-rule"></div>
    </div>
    <div class="chat-messages" id="messages"></div>
    <div class="chat-input-row">
      <input id="textInput" type="text" placeholder="Type or speak your question..." />
      <button id="micBtn">🎤</button>
      <button id="sendBtn">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M3 20L21 12L3 4V10L17 12L3 14V20Z" fill="currentColor" />
        </svg>
      </button>
    </div>
  </div>

  <script>
    document.documentElement.style.setProperty(
      '--watermark',
      "url('https://cache.careers360.mobi/media/colleges/social-media/media-gallery/24187/2020/7/27/Campus%20view%20of%20CSI%20Wesley%20Institute%20of%20Technology%20and%20Sciences%20Secunderabad_Campus-view.jpg')"
    );
    const API_URL = "https://result-ai.onrender.com/api/chat";

    let sessionId = localStorage.getItem("sessionId");
    if (!sessionId) {
      sessionId = crypto.randomUUID();
      localStorage.setItem("sessionId", sessionId);
    }

    const messagesEl = document.getElementById("messages");
    const textInput = document.getElementById("textInput");
    const sendBtn = document.getElementById("sendBtn");
    const micBtn = document.getElementById("micBtn");
    const stopBtn = document.getElementById("stopBtn");

    function renderMarkdown(text) {
      let html = text
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");

      html = html.replace(/^### (.*$)/gim, "<h3>$1</h3>");
      html = html.replace(/^## (.*$)/gim, "<h2>$1</h2>");
      html = html.replace(/^# (.*$)/gim, "<h1>$1</h1>");
      html = html.replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>");

      html = html.replace(/(?:^|\n)((?:[*-] .*(?:\n|$))+)/g, (block) => {
        const items = block
          .trim()
          .split("\n")
          .map((line) => "<li>" + line.replace(/^[*-]\s+/, "") + "</li>")
          .join("");
        return "<ul>" + items + "</ul>";
      });

      html = html
        .split(/\n{2,}/)
        .map((para) => (para.startsWith("<ul>") || para.startsWith("<h") ? para : "<p>" + para.replace(/\n/g, "<br>") + "</p>"))
        .join("");

      return html;
    }

    function addMessage(text, sender) {
      const div = document.createElement("div");
      div.className = "msg " + sender;
      if (sender === "bot") {
        div.innerHTML = renderMarkdown(text);
      } else {
        div.textContent = text;
      }
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return div;
    }

    function showTyping() {
      const div = document.createElement("div");
      div.className = "msg bot typing";
      div.id = "typingIndicator";
      div.innerHTML = '<span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span>';
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function hideTyping() {
      const el = document.getElementById("typingIndicator");
      if (el) el.remove();
    }

    async function sendMessage(message) {
      if (!message.trim()) return;
      addMessage(message, "user");
      textInput.value = "";
      showTyping();

      try {
        const res = await fetch(API_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ sessionId, message }),
        });
        const data = await res.json();
        const reply = data.reply || data.error || "Something went wrong.";
        hideTyping();
        addMessage(reply, "bot");
        speak(reply);
      } catch (err) {
        hideTyping();
        addMessage("Error reaching server: " + err.message, "bot");
      }
    }

    function speak(text) {
      speechSynthesis.cancel();
      const plainText = text.replace(/[*#_`]/g, "");
      const utterance = new SpeechSynthesisUtterance(plainText);
      utterance.rate = 1;
      speechSynthesis.speak(utterance);
    }

    stopBtn.addEventListener("click", () => speechSynthesis.cancel());

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    let recognition;
    let listening = false;

    if (SpeechRecognition) {
      recognition = new SpeechRecognition();
      recognition.lang = "en-IN";
      recognition.interimResults = false;

      recognition.onresult = (event) => {
        const transcript = event.results[0][0].transcript;
        sendMessage(transcript);
      };

      recognition.onend = () => {
        listening = false;
        micBtn.classList.remove("listening");
      };
    } else {
      micBtn.disabled = true;
      micBtn.title = "Speech recognition not supported in this browser (use Chrome)";
    }

    micBtn.addEventListener("click", () => {
      if (!recognition) return;
      if (listening) {
        recognition.stop();
      } else {
        recognition.start();
        listening = true;
        micBtn.classList.add("listening");
      }
    });

    sendBtn.addEventListener("click", () => sendMessage(textInput.value));
    textInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") sendMessage(textInput.value);
    });

    addMessage("Hi! Tell me your hall ticket number to get started, e.g. \"My hall ticket is 23XU1A0578\".", "bot");
  </script>

</body>

</html>
